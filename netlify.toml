[build]
  publish = "."
  functions = "netlify/functions"

# data.js is served live from Supabase on the hosted site, same as
# scan-server.js does for localhost (see netlify/functions/data-js.js).
[[redirects]]
  from = "/data.js"
  to = "/.netlify/functions/data-js"
  status = 200

[[redirects]]
  from = "/firecrawl-scan"
  to = "/.netlify/functions/firecrawl-scan-background"
  status = 200

[[redirects]]
  from = "/firecrawl-status"
  to = "/.netlify/functions/firecrawl-status"
  status = 200
