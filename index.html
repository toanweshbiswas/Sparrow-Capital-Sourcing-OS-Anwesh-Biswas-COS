          <span class="nav-badge" id="linkedin-count">60</span>
        </a>
        <a class="nav-item" data-view="pipeline" id="nav-pipeline">

          <span class="nav-label">Follow-ups</span>
          <span class="nav-badge" id="followup-count">0</span>
        </a>
        <a class="nav-item" data-view="investors" id="nav-investors">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>

          <span class="nav-label">Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="thesis-pill">
          <span class="thesis-dot"></span>
          <span>Seed · India · $1–2M</span>
        </div>
        <div class="version-tag">v1.0 · July 2026</div>
      </div>
    </aside>

    <!-- ═══════════════════════════════════════════
         MAIN CONTENT
    ════════════════════════════════════════════ -->
    <div id="main-wrapper">
      <header id="topbar">
        <div class="topbar-left">
          <h1 id="page-title">Dashboard</h1>
          <span id="page-subtitle" class="page-subtitle">Signal-to-Conviction Pipeline</span>
        </div>
        <div class="topbar-right">
          <div id="scan-status" class="scan-status hidden">
            <span class="scan-dot"></span>
            <span id="scan-text">Scanning...</span>
          </div>
          <button id="crawl-btn" class="btn btn-primary" onclick="Scanner.runFirecrawl()">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.586 4.586a2 2 0 112.828 2.828l-3 3a2 2 0 01-2.828 0 1 1 0 00-1.414 1.414 4 4 0 005.656 0l3-3a4 4 0 00-5.656-5.656l-1.5 1.5a1 1 0 101.414 1.414l1.5-1.5zm-5 5a2 2 0 012.828 0 1 1 0 001.414-1.414 4 4 0 00-5.656 0l-3 3a4 4 0 105.656 5.656l1.5-1.5a1 1 0 10-1.414-1.414l-1.5 1.5a2 2 0 11-2.828-2.828l3-3z" clip-rule="evenodd"/></svg>
            Crawl Web
          </button>
          <button id="scan-btn" class="btn btn-ghost" onclick="Scanner.runScan()">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/></svg>
            Agent Scan
          </button>
          <button class="btn btn-ghost" onclick="Export.toCSV()">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
            Export CSV
          </button>
          <div id="last-scan" class="last-scan">Last scan: —</div>
        </div>
      </header>

      <main id="view-container"></main>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       MODAL
  ════════════════════════════════════════════ -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box" class="modal-box">
      <button class="modal-close" id="modal-close-btn">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
      </button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast-container"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
